name: discurd

# Discurd local stack. Quickstart:  docker compose up -d --build
# Scale-out overlay:               docker compose -f docker-compose.yml -f docker-compose.scale.yml up -d
# See docs/ARCHITECTURE.md for the contract all services follow.

networks:
  discurd:
    driver: bridge

volumes:
  scylla_data:
  redis_data:
  nats_data:
  minio_data:
  prometheus_data:
  grafana_data:

services:
  # ---------------------------------------------------------------- edge
  traefik:
    # v3.7+ required: older Traefik docker clients speak API < 1.44, which Docker 29+ rejects.
    image: traefik:v3.7
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      # websecure is defined here so routers can attach to it; :443 is only
      # published (and http->https redirect enabled) by docker-compose.prod.yml.
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls=true
      - --entrypoints.metrics.address=:8082
      - --metrics.prometheus=true
      - --metrics.prometheus.entrypoint=metrics
      - --api.dashboard=true
      - --api.insecure=true
      - --ping=true
    ports:
      - "80:80"       # app: / (web), /api (api), /ws (gateway), /files (minio)
      - "8090:8080"   # traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [discurd]

  # ---------------------------------------------------------------- data
  scylla:
    image: scylladb/scylla:6.2
    restart: unless-stopped
    command: --developer-mode=1 --smp 1 --memory 750M --overprovisioned 1
    ports:
      - "9042:9042"   # CQL for host tooling (cqlsh)
    volumes:
      - scylla_data:/var/lib/scylla
    networks: [discurd]
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT now() FROM system.local'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  scylla-init:
    image: scylladb/scylla:6.2
    depends_on:
      scylla:
        condition: service_healthy
    entrypoint: ["cqlsh", "scylla", "-f", "/db/schema.cql"]
    volumes:
      - ./db/schema.cql:/db/schema.cql:ro
    networks: [discurd]
    restart: on-failure

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks: [discurd]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"   # monitoring
    volumes:
      - nats_data:/data
    networks: [discurd]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9001:9001"   # console
    volumes:
      - minio_data:/data
    networks: [discurd]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    labels:
      - traefik.enable=true
      - traefik.http.routers.files.rule=PathPrefix(`/files`)
      - traefik.http.routers.files.entrypoints=web,websecure
      - traefik.http.routers.files.middlewares=files-strip,files-safe
      - traefik.http.middlewares.files-strip.stripprefix.prefixes=/files
      # User content is served from the app's own origin, so force every object
      # to download rather than render inline (this does not affect <img>/<video>
      # embedding). With nosniff, an uploaded HTML/SVG can never execute here.
      - traefik.http.middlewares.files-safe.headers.customresponseheaders.Content-Disposition=attachment
      - traefik.http.middlewares.files-safe.headers.customresponseheaders.X-Content-Type-Options=nosniff
      - traefik.http.services.files.loadbalancer.server.port=9000

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/avatars local/attachments &&
      mc anonymous set download local/avatars &&
      mc anonymous set download local/attachments &&
      echo 'minio buckets ready'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    networks: [discurd]
    restart: on-failure

  # ---------------------------------------------------------------- voice (WebRTC SFU)
  livekit:
    image: livekit/livekit-server:v1.8.4
    restart: unless-stopped
    # Config is supplied inline so node_ip/keys are env-driven. Signaling (7880)
    # is fronted by Traefik at /livekit; media is UDP 7882 (mux) + TCP 7881.
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          tcp_port: 7881
          udp_port: 7882
          use_external_ip: false
          node_ip: ${LIVEKIT_NODE_IP:-127.0.0.1}
        keys:
          ${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-devsecret_change_me_please_0123456789abcdef}
        logging:
          level: info
    ports:
      - "7881:7881"       # ICE/TCP fallback (media when UDP is blocked)
      - "7882:7882/udp"   # SRTP media (mux)
    networks: [discurd]
    labels:
      - traefik.enable=true
      - traefik.http.routers.livekit.rule=PathPrefix(`/livekit`)
      - traefik.http.routers.livekit.entrypoints=web,websecure
      - traefik.http.routers.livekit.middlewares=livekit-strip
      - traefik.http.middlewares.livekit-strip.stripprefix.prefixes=/livekit
      - traefik.http.services.livekit.loadbalancer.server.port=7880

  # ---------------------------------------------------------------- app
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      SERVICE_NAME: api
      ENV: ${ENV:-development}
      PORT: "8080"
      SCYLLA_HOSTS: scylla
      SCYLLA_KEYSPACE: discurd
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_USE_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-please-0123456789abcdef}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-168h}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-25}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-devsecret_change_me_please_0123456789abcdef}
      LIVEKIT_WS_URL: ${LIVEKIT_WS_URL:-ws://localhost/livekit}
      GIPHY_API_KEY: ${GIPHY_API_KEY:-}
      TENOR_API_KEY: ${TENOR_API_KEY:-}
      TENOR_CLIENT_KEY: ${TENOR_CLIENT_KEY:-discurd}
    depends_on:
      scylla-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [discurd]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=PathPrefix(`/api`)
      - traefik.http.routers.api.entrypoints=web,websecure
      - traefik.http.services.api.loadbalancer.server.port=8080

  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.gateway
    restart: unless-stopped
    environment:
      SERVICE_NAME: gateway
      ENV: ${ENV:-development}
      PORT: "8080"
      SCYLLA_HOSTS: scylla
      SCYLLA_KEYSPACE: discurd
      REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-please-0123456789abcdef}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      scylla-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks: [discurd]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    labels:
      - traefik.enable=true
      - traefik.http.routers.gateway.rule=PathPrefix(`/ws`)
      - traefik.http.routers.gateway.entrypoints=web,websecure
      - traefik.http.services.gateway.loadbalancer.server.port=8080

  web:
    build:
      context: ./web
    restart: unless-stopped
    depends_on:
      - api
      - gateway
    networks: [discurd]
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=PathPrefix(`/`)
      - traefik.http.routers.web.priority=1
      - traefik.http.routers.web.entrypoints=web,websecure
      - traefik.http.services.web.loadbalancer.server.port=80

  # ---------------------------------------------------------------- observability
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [discurd]

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks: [discurd]
    depends_on:
      - prometheus

  redis-exporter:
    image: oliver006/redis_exporter:latest
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    networks: [discurd]
    depends_on:
      - redis

  nats-exporter:
    image: natsio/prometheus-nats-exporter:latest
    restart: unless-stopped
    command: ["-varz", "-connz", "-subz", "http://nats:8222"]
    networks: [discurd]
    depends_on:
      - nats
