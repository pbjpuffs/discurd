# EXAMPLE ONLY — do not deploy these values.
# Create the real secret out-of-band (SealedSecrets, ExternalSecrets, SOPS, or:
#   kubectl -n discurd create secret generic discurd-secrets \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=MINIO_ROOT_USER=discurd-objects \
#     --from-literal=MINIO_ROOT_PASSWORD="$(openssl rand -hex 24)"
# ) and remove this file from kustomization.yaml.
# MINIO_ROOT_USER / MINIO_ROOT_PASSWORD must match the MinIO install (or be the
# access key / secret key when pointing at real S3).
apiVersion: v1
kind: Secret
metadata:
  name: discurd-secrets
  namespace: discurd
  labels:
    app.kubernetes.io/part-of: discurd
type: Opaque
stringData:
  JWT_SECRET: "CHANGE-ME-generate-with-openssl-rand-hex-32"
  MINIO_ROOT_USER: "CHANGE-ME-minio-user"
  MINIO_ROOT_PASSWORD: "CHANGE-ME-minio-password"
