# Discurd WebSocket gateway — stateless: NATS fan-out means any replica serves
# any user (see docs/DEPLOYMENT.md §2). Longer grace period to drain sockets.
# Image placeholder: set your registry/tag in kustomization.yaml (images:).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: discurd
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: discurd
spec:
  # No replicas here on purpose: hpa.yaml owns the replica count (pinning it
  # would reset a scaled-up fleet on every `kubectl apply`).
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/part-of: discurd
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: gateway
          image: REGISTRY/discurd-gateway:TAG
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: "gateway"
            - name: PORT
              value: "8080"
          envFrom:
            - configMapRef:
                name: discurd-config
            - secretRef:
                name: discurd-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: discurd
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: discurd
spec:
  selector:
    app.kubernetes.io/name: gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
